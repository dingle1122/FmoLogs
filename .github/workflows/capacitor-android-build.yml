name: 'Capacitor Android Build'

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: '自定义 Release Tag（如 v1.2.3-android）。留空则使用 package.json 版本自动生成。'
        required: false
        default: ''
  push:
    branches:
      - main
      # - develop
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 让所有 JavaScript actions 强制在 Node.js 24 运行时执行，
# 消除 2026-06-02 起生效的 Node.js 20 弃用警告。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Generate Android icons
        run: bash scripts/generate-android-icons.sh

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
            echo "Keystore decoded successfully"
          else
            echo "No keystore secret found, will use debug signing"
          fi

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && 'keystore.jks' || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "name=FmoLogs ${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "name=FmoLogs v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK with version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p apk-output
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp "android/app/build/outputs/apk/release/app-release-unsigned.apk" "apk-output/FmoLogs-v${VERSION}-android.apk"
          elif [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp "android/app/build/outputs/apk/release/app-release.apk" "apk-output/FmoLogs-v${VERSION}-android.apk"
          elif [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp "android/app/build/outputs/apk/debug/app-debug.apk" "apk-output/FmoLogs-v${VERSION}-android-debug.apk"
          fi

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          draft: true
          prerelease: false
          files: apk-output/*.apk
