name: 'publish'

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: '自定义 Release Tag（如 v1.2.3-dev）。留空则使用 package.json 版本自动生成。'
        required: false
        default: ''
  push:
    branches:
      - main
      - master
      - feature/tauri
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''
  
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
  
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
  
      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'
  
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
  
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
  
      - name: install frontend dependencies
        run: npm install

      - name: generate icons from source
        run: npx tauri icon src-tauri/icons/icon.png

      - name: resolve release tag
        id: release
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "name=FmoLogs ${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "name=FmoLogs v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.name }}
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: publish-tauri
    steps:
      - uses: actions/checkout@v5

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 platforms;android-36 build-tools;35.0.0 build-tools;36.0.0 ndk;26.1.10909125'

      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Rust + ARM Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Remove stale Android project
        run: rm -rf src-tauri/gen/android

      - name: Init Tauri Android scaffold
        run: npx tauri android init

      - name: generate Android icons from source
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/app/release.keystore

      - name: Inject gradle signingConfig
        run: |
          python3 << 'PYEOF'
          import re
          bf = "src-tauri/gen/android/app/build.gradle.kts"
          with open(bf, "r") as f:
              content = f.read()

          # 注入 signingConfigs（如果不存在）
          if "signingConfigs" not in content:
              signing_block = (
                  "\n    signingConfigs {"
                  '\n        create("release") {'
                  '\n            storeFile = file("release.keystore")'
                  '\n            storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: ""'
                  '\n            keyAlias = System.getenv("ANDROID_KEY_ALIAS") ?: ""'
                  '\n            keyPassword = System.getenv("ANDROID_KEY_PASSWORD") ?: ""'
                  '\n        }'
                  '\n    }'
              )
              content = re.sub(r'(\s+buildTypes\s*\{)', signing_block + r'\1', content, count=1)

          # 确保 release buildType 引用签名配置
          content = re.sub(
              r'(getByName\("release"\)\s*\{)',
              r'\1\n            signingConfig = signingConfigs.getByName("release")',
              content,
              count=1
          )
          with open(bf, "w") as f:
              f.write(content)
          PYEOF

      - name: Allow cleartext traffic in AndroidManifest
        run: |
          python3 << 'PYEOF'
          import re
          mf = "src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          with open(mf, "r") as f:
              content = f.read()

          # 在 <application> 标签中添加 usesCleartextTraffic
          if "usesCleartextTraffic" not in content:
              content = re.sub(
                  r'(<application\s+)',
                  r'\1android:usesCleartextTraffic="true" \n        ',
                  content,
                  count=1
              )
              with open(mf, "w") as f:
                  f.write(content)
              print("已注入 usesCleartextTraffic")
          else:
              print("usesCleartextTraffic 已存在")
          PYEOF

      - name: Build Android APK (release signed, arm64 + armv7)
        id: build
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npx tauri android build --apk --target aarch64 --target armv7

      - name: Collect and rename APKs
        id: collect
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # 优先使用手动输入的自定义 tag，否则自动构造
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          else
            RELEASE_TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          APK_DIR="src-tauri/gen/android/app/build/outputs/apk"
          FOUND=0

          while IFS= read -r apk; do
            [ -z "$apk" ] && continue
            ABI=$(echo "$apk" | sed -n 's|.*/apk/\([^/]*\)/release/.*|\1|p')
            [ -z "$ABI" ] && ABI="universal"
            OUT="FmoLogs_${VERSION}_${ABI}.apk"
            cp "$apk" "$OUT"
            FOUND=$((FOUND + 1))
            echo "  → $OUT ($(du -h "$apk" | cut -f1))"
          done < <(find "$APK_DIR" -path '*/release/*.apk' -type f 2>/dev/null)

          if [ "$FOUND" -eq 0 ]; then
            echo "::error::No APK found under $APK_DIR"
            find src-tauri/gen/android -type f | head -50
            exit 1
          fi

          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

      - name: Build summary
        shell: bash
        run: |
          echo "## 📦 Android Build Summary"
          echo ""
          echo "Files in workspace root:"
          ls -la FmoLogs_*.apk 2>/dev/null || echo "(none)"
          echo ""
          echo "Original APKs in build outputs:"
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f -ls 2>/dev/null || echo "(none)"
          echo ""
          echo "Version: ${{ steps.collect.outputs.version }}"
          echo "APKs found: ${{ steps.collect.outputs.found }}"
          echo "Release tag: ${{ steps.collect.outputs.release_tag }}"

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.collect.outputs.release_tag }}"
          RELEASE_NAME="FmoLogs v${{ steps.collect.outputs.version }}"

          # 如果 release 不存在则创建 draft（与桌面端 tauri-action 保持一致）
          if ! gh release view "$RELEASE_TAG" &>/dev/null; then
            gh release create "$RELEASE_TAG" --draft --title "$RELEASE_NAME" --notes "See the assets to download this version and install."
          fi

          echo "Uploading APKs to release $RELEASE_TAG ..."
          ls -lh FmoLogs_*.apk
          gh release upload "$RELEASE_TAG" FmoLogs_*.apk --clobber

      - name: Verify files before artifact upload
        shell: bash
        run: |
          echo "Verifying APK files for artifact upload..."
          ls -la FmoLogs_*.apk || { echo "::error::No APK files found!"; exit 1; }

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FmoLogs-android-${{ steps.collect.outputs.version }}
          path: FmoLogs_*.apk
          if-no-files-found: error
