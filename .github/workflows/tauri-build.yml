  publish-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: install frontend dependencies
        run: npm install

      - name: remove stale Android project
        run: rm -rf src-tauri/gen/android

      - name: init Tauri Android project
        run: npx tauri android init

      - name: install required Android platform
        run: |
          COMPILE_SDK=$(grep -oP 'compileSdk\s*=\s*\K\d+' src-tauri/gen/android/app/build.gradle.kts || echo "34")
          echo "Detected compileSdk: $COMPILE_SDK"
          sdkmanager "platforms;android-${COMPILE_SDK}"

      - name: add signing config
        run: |
          python3 << 'PYEOF'
          bf = "src-tauri/gen/android/app/build.gradle.kts"
          with open(bf, "r") as f:
              content = f.read()
          signing_block = (
              "\n    signingConfigs {"
              '\n        create("release") {'
              '\n            storeFile = file(project.property("RELEASE_STORE_FILE") as String)'
              '\n            storePassword = project.property("RELEASE_STORE_PASSWORD") as String'
              '\n            keyAlias = project.property("RELEASE_KEY_ALIAS") as String'
              '\n            keyPassword = project.property("RELEASE_KEY_PASSWORD") as String'
              '\n        }'
              '\n    }'
          )
          content = content.replace("    buildTypes {", signing_block + "\n    buildTypes {")
          content = content.replace(
              '        getByName("release") {',
              '        getByName("release") {\n            signingConfig = signingConfigs.getByName("release")'
          )
          with open(bf, "w") as f:
              f.write(content)
          PYEOF

      - name: decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/release.keystore

      - name: write signing properties
        run: |
          cat >> src-tauri/gen/android/gradle.properties << EOF
          RELEASE_STORE_FILE=../release.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: diagnose Gradle setup
        run: |
          cd src-tauri/gen/android
          chmod +x gradlew
          ./gradlew projects --stacktrace 2>&1 | tail -50 || true

      - name: build Android APK
        run: npx tauri android build --verbose

      - name: upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab

      - name: publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
