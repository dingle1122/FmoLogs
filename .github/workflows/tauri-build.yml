  publish-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools ndk;26.1.10909125'

      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Rust + ARM Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Remove stale Android project
        run: rm -rf src-tauri/gen/android

      - name: Init Tauri Android scaffold
        run: npx tauri android init

      - name: Install required Android SDK components
        run: |
          COMPILE_SDK=$(grep -oP 'compileSdk\s*=\s*\K\d+' src-tauri/gen/android/app/build.gradle.kts || echo "34")
          echo "Detected compileSdk: $COMPILE_SDK"
          sdkmanager "platforms;android-${COMPILE_SDK}" "build-tools;${COMPILE_SDK}.0.0"

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/app/release.keystore

      - name: Inject gradle signingConfig
        run: |
          python3 << 'PYEOF'
          bf = "src-tauri/gen/android/app/build.gradle.kts"
          with open(bf, "r") as f:
              content = f.read()
          signing_block = (
              "\n    signingConfigs {"
              '\n        create("release") {'
              '\n            storeFile = file("release.keystore")'
              '\n            storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: ""'
              '\n            keyAlias = System.getenv("ANDROID_KEY_ALIAS") ?: ""'
              '\n            keyPassword = System.getenv("ANDROID_KEY_PASSWORD") ?: ""'
              '\n        }'
              '\n    }'
          )
          content = content.replace("    buildTypes {", signing_block + "\n    buildTypes {")
          content = content.replace(
              '        getByName("release") {',
              '        getByName("release") {\n            signingConfig = signingConfigs.getByName("release")'
          )
          with open(bf, "w") as f:
              f.write(content)
          PYEOF

      - name: Build Android APK (release signed, arm64 + armv7)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npx tauri android build --apk --target aarch64 --target armv7

      - name: Locate and rename APK
        shell: bash
        run: |
          APK=$(find src-tauri/gen/android -name '*.apk' -print | head -1)
          if [ -z "$APK" ]; then
            echo "::error::APK not found under src-tauri/gen/android"
            find src-tauri/gen/android -type f | head -50
            exit 1
          fi
          echo "Found APK at: $APK"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          cp "$APK" "FmoLogs_${VERSION}_android.apk"
          ls -lh FmoLogs_*_android.apk

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FmoLogs ${{ github.ref_name }}
          draft: true
          files: |
            FmoLogs_*_android.apk

      - name: Upload APK as artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: FmoLogs-android-apk
          path: FmoLogs_*_android.apk
