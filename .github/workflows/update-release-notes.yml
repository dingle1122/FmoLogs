name: 'Update Release Notes'

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: '要更新的 Release Tag（如 v1.2.4）。留空则使用 package.json 版本自动生成。'
        required: false
        default: ''
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 让所有 JavaScript actions 强制在 Node.js 24 运行时执行，
# 消除 2026-06-02 起生效的 Node.js 20 弃用警告。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release body
        id: body
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          
          echo "## 下载" > release_body.md
          echo "" >> release_body.md
          echo "macOS Apple Silicon (M1/M2/M3/M4)：FmoLogs_aarch64.dmg" >> release_body.md
          echo "macOS Intel：FmoLogs_x64.dmg" >> release_body.md
          echo "Windows：FmoLogs_x64-setup.exe 或 .msi" >> release_body.md
          echo "Linux：FmoLogs_amd64.deb 或 .AppImage" >> release_body.md
          echo "Android：FmoLogs-v${VERSION}-android.apk" >> release_body.md
          echo "" >> release_body.md
          echo "## Mac 启动" >> release_body.md
          echo "" >> release_body.md
          echo "未签名版本首次打开会被 Gatekeeper / SmartScreen 拦截：" >> release_body.md
          echo "macOS（已做 ad-hoc 签名，仍可能被 Gatekeeper 拦）" >> release_body.md
          echo "常规：右键 FmoLogs.app → 打开 → \"仍要打开\"" >> release_body.md
          echo "若提示\"已损坏\"：终端执行 xattr -cr /Applications/FmoLogs.app 后再打开" >> release_body.md
          echo "" >> release_body.md
          echo "## Windows 启动" >> release_body.md
          echo "" >> release_body.md
          echo "点\"更多信息 → 仍要运行\"" >> release_body.md
          
          # 输出 body 内容供后续使用
          echo "BODY_CONTENT=$(cat release_body.md | base64 -w 0)" >> "$GITHUB_OUTPUT"

      - name: Update Release via GitHub API
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NAME: FmoLogs ${{ steps.release.outputs.tag }}
          BODY_FILE: release_body.md
        run: |
          # 先尝试获取已存在的 release
          EXISTING_RELEASE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG")
          
          RELEASE_ID=$(echo "$EXISTING_RELEASE" | jq -r '.id // empty')
          
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            echo "Release exists, updating..."
            # 更新已存在的 release
            curl -s -X PATCH \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"$RELEASE_NAME\",
                \"body\": $(cat $BODY_FILE | jq -Rs .),
                \"draft\": false,
                \"prerelease\": false,
                \"make_latest\": \"true\"
              }" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            echo "Release updated successfully"
          else
            echo "Release not found, creating..."
            # 创建新的 release
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d "{
                \"tag_name\": \"$RELEASE_TAG\",
                \"name\": \"$RELEASE_NAME\",
                \"body\": $(cat $BODY_FILE | jq -Rs .),
                \"draft\": false,
                \"prerelease\": false,
                \"make_latest\": \"true\"
              }" \
              "https://api.github.com/repos/${{ github.repository }}/releases"
            echo "Release created successfully"
          fi
