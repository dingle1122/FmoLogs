apply plugin: 'com.android.application'

// ========== 从 package.json 同步版本号 ==========
// versionName 直接用 package.json.version（如 "1.2.3"）
// versionCode 按 major*10000 + minor*100 + patch 规则生成（如 1.2.3 → 10203），
// 这样只要 npm 版本升了 gradle 构建版本号自动递增，不用再手动改两个地方。
def packageJsonFile = file("../../package.json")
def packageVersion = new groovy.json.JsonSlurper()
    .parseText(packageJsonFile.text).version
def cleanVersion = packageVersion.replaceAll(/[^0-9.].*\$/, '')
def verParts = cleanVersion.tokenize('.')
def appVersionMajor = verParts.size() > 0 ? verParts[0].toInteger() : 0
def appVersionMinor = verParts.size() > 1 ? verParts[1].toInteger() : 0
def appVersionPatch = verParts.size() > 2 ? verParts[2].toInteger() : 0
def appVersionCode = appVersionMajor * 10000 + appVersionMinor * 100 + appVersionPatch
def appVersionName = packageVersion

// ========== 读取正式签名参数（env 或 ~/.gradle/gradle.properties 均可） ==========
// Gradle 的 file() 不会自动展开 ~，这里手动处理成绝对路径
def expandHome = { String p ->
    if (p == null || p.isEmpty()) return p
    if (p.startsWith('~/') || p == '~') {
        return System.getProperty('user.home') + p.substring(1)
    }
    return p
}
def releaseKsPath     = expandHome(System.getenv("ANDROID_KEYSTORE_PATH")     ?: project.findProperty("ANDROID_KEYSTORE_PATH"))
def releaseKsPassword = System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: project.findProperty("ANDROID_KEYSTORE_PASSWORD")
def releaseKsAlias    = System.getenv("ANDROID_KEY_ALIAS")         ?: project.findProperty("ANDROID_KEY_ALIAS")
def releaseKsKeyPass  = System.getenv("ANDROID_KEY_PASSWORD")      ?: project.findProperty("ANDROID_KEY_PASSWORD")
def hasReleaseKeystore = releaseKsPath && releaseKsPassword && releaseKsAlias && releaseKsKeyPass && file(releaseKsPath).exists()

android {
    namespace = "com.fmologs.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.fmologs.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                storeFile file(releaseKsPath)
                storePassword releaseKsPassword
                keyAlias releaseKsAlias
                keyPassword releaseKsKeyPass
            }
        }
    }

    buildTypes {
        debug {
            // 只要本地/CI 配了正式 keystore，debug 也用同一把签，
            // 避免 `installDebug` 与 release APK 之间 INSTALL_FAILED_UPDATE_INCOMPATIBLE。
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            }
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'androidx.media:media:1.7.0'
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
